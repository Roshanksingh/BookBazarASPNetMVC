services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bookbazar_db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "2026!Spring"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '2026!Spring' -Q 'SELECT 1' -C || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookbazar_app
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      ASPNETCORE_URLS: "http://+:8080"

      # Database
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=BookBazarDb;User Id=sa;Password=2026!Spring;TrustServerCertificate=True"

      # Required by DBInitializer
      SeedAdmin__Email: "admin@bookbazar.com"
      SeedAdmin__Password: "Admin@123"

      # Stripe
      Stripe__SecretKey: ""
      Stripe__PublishableKey: ""

volumes:
  sql_data:
